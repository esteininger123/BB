     Per Doppelklick öffnen, Cmd+P → "PDF speichern" für 1:1-Vergleich mit dem

     NACH dem Push kann diese Datei gelöscht werden — sie ist nur für visuelles QA.  -->

  body { margin: 0; padding: 0; background: #ddd; }
  .preview-bar { position: fixed; top: 0; right: 0; padding: 8px 14px; background: #000; color: #fff; font-family: sans-serif; font-size: 12px; z-index: 999; }
  @media print { .preview-bar { display: none; } }
  /* PDF-Mode aktivieren ohne body-Klasse: Print-Layout immer */
  body.pdf-mode-preview .pdf-template { display: block !important; }
  body.pdf-mode-preview .pdf-page {
    page-break-after: always;
    min-height: 245mm;
    width: 210mm;
    margin: 10px auto;
    padding: 14mm 12mm 18mm 12mm;
    background: #fff;
    box-shadow: 0 0 6px rgba(0,0,0,0.2);
    box-sizing: border-box;
    position: relative;
  }
  @media print {
    body { background: #fff !important; }
    .pdf-page { margin: 0 !important; box-shadow: none !important; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
