<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Reservierungsvereinbarung — Brot &amp; Butter Immobilien</title>
<style>
  /* 06.07.2026 (Henry) — Extern-Reservierung: kundenseitige Unterschriften-Seite.
     Layout angelehnt ans PandaDoc-Muster „Kaufabsichtserklärung und
     Reservierungsvereinbarung" (Logo oben rechts, Vertragsparteien, Objektblock,
     zwei Unterschriftenspalten). */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #EDEBE6; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; color: #1A1A17; padding: 24px 12px; }
  .sheet { background: #fff; max-width: 800px; margin: 0 auto; padding: 48px 52px 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.12); }
  .kopf { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 34px; }
  .kopf h1 { font-size: 15.5px; font-weight: 700; margin-top: 26px; }
  .kopf img { height: 52px; }
  h2 { font-size: 14px; font-weight: 700; margin: 26px 0 10px; }
  p, li { font-size: 13.5px; line-height: 1.6; }
  .block { margin-bottom: 14px; }
  .zwischen { letter-spacing: .06em; font-weight: 600; font-size: 12.5px; margin: 18px 0 10px; }
  table.objekt { border-collapse: collapse; margin: 10px 0 4px; width: 100%; max-width: 430px; }
  table.objekt td { font-size: 13.5px; padding: 3px 0; }
  table.objekt td.z { text-align: right; font-variant-numeric: tabular-nums; }
  table.objekt tr.summe td { border-top: 1px solid #1A1A17; font-weight: 700; padding-top: 5px; }
  .praemisse { background: #F7F4EE; border-left: 3px solid #B08A4D; padding: 10px 14px; margin: 16px 0; font-size: 12.5px; line-height: 1.55; }
  .sig-grid { display: flex; justify-content: space-between; gap: 40px; margin-top: 44px; flex-wrap: wrap; }
  .sig-col { flex: 1; min-width: 260px; }
  .sig-col.rechts { text-align: right; }
  .sig-img { height: 64px; margin-bottom: 4px; }
  .sig-linie { border-bottom: 1px solid #1A1A17; height: 0; margin-bottom: 6px; }
  .sig-meta { font-size: 12.5px; line-height: 1.55; }
  #sig-canvas { border: 1px dashed #B08A4D; border-radius: 6px; background: #FDFCF9; width: 100%; max-width: 340px; height: 110px; touch-action: none; cursor: crosshair; display: block; margin-left: auto; }
  .sig-tools { display: flex; justify-content: flex-end; gap: 10px; margin: 6px 0 8px; }
  button { font-family: inherit; font-size: 13.5px; padding: 10px 18px; border-radius: 6px; border: 1px solid #B08A4D; cursor: pointer; }
  .btn-primary { background: #1A1A17; color: #FBFAF7; border-color: #1A1A17; font-weight: 600; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: #6B6B64; border-color: #D8D4CB; font-size: 12px; padding: 6px 12px; }
  .aktion { margin-top: 26px; text-align: right; }
  .hinweis { font-size: 11.5px; color: #7A7A72; margin-top: 10px; text-align: right; }
  #status { text-align: center; padding: 60px 20px; font-size: 15px; color: #6B6B64; }
  .fehler { color: #9A3E33; }
  .ok-banner { background: #EAF3EC; border-left: 3px solid #2D6E47; padding: 12px 16px; margin-bottom: 22px; font-size: 13.5px; }
  @media print {
    body { background: #fff; padding: 0; }
    .sheet { box-shadow: none; max-width: none; padding: 20px 10mm; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>
  <div id="status">Reservierung wird geladen …</div>
  <div class="sheet" id="doc" style="display:none;"></div>

<script>
(function () {
  const token = new URLSearchParams(location.search).get('token') || '';
  const api = '/api/reservierung/portal/' + encodeURIComponent(token);
  const statusEl = document.getElementById('status');
  const docEl = document.getElementById('doc');

  const eur = (v) => (Math.round(v || 0)).toLocaleString('de-DE') + ' €';
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  const heute = new Date().toLocaleDateString('de-DE');

  function render(d) {
    const doc = d.doc || {};
    const adr = d.adresse || {};
    const signiert = d.signiert && d.signiert.am;
    const subvZeilen = (Array.isArray(doc.subvPhasen) && doc.subvPhasen.length)
      ? doc.subvPhasen.map((p, idx) => `<tr><td>Mietsubvention Phase ${idx + 1}</td><td class="z">${eur(p.mo)}/Monat für ${p.monate} Monate</td></tr>`).join('')
      : (doc.subvMo > 0 && doc.subvMonate > 0 ? `<tr><td>Mietsubvention</td><td class="z">${eur(doc.subvMo)}/Monat für ${doc.subvMonate} Monate</td></tr>` : '');

    docEl.innerHTML = `
      ${signiert ? `<div class="ok-banner no-print"><strong>✓ Unterschrieben am ${new Date(d.signiert.am).toLocaleDateString('de-DE')}.</strong> Sie können dieses Dokument für Ihre Unterlagen drucken oder als PDF sichern.</div>` : ''}
      <div class="kopf">
        <h1>Kaufabsichtserklärung und Reservierungsvereinbarung</h1>
        <img src="/assets/bub-logo.svg" alt="Brot &amp; Butter Immobilien">
      </div>

      <div class="zwischen">ZWISCHEN</div>
      <div class="block">
        <p>Verkäufer: <strong>Henry Wacker</strong><br>
        B&amp;B Immo GmbH<br>
        Burdastraße 23<br>
        77746 Schutterwald</p>
      </div>
      <div class="zwischen">UND</div>
      <div class="block">
        <p>Kaufinteressent-/in:<br>
        <strong>${esc(d.kaeufer)}</strong><br>
        ${esc(adr.strasse)}<br>
        ${esc(adr.plz)} ${esc(adr.ort)}</p>
      </div>
      <p style="font-size:12px;color:#7A7A72;">Vermittelt durch: ${esc(d.vertrieblerName)}</p>

      <h2>Kaufabsichtserklärung</h2>
      <p class="block">Die Vertragsparteien vereinbaren die Reservierung des Objekts bis zum <strong>${esc(d.reservBis)}</strong>.<br>
      Innerhalb dieser Zeit wird ein Notartermin festgelegt. Die Kaufinteressenten beauftragen hiermit ausdrücklich
      diesen Notartermin und tragen dementsprechend alle Kosten, die mit einer Absage verbunden wären.</p>

      <p><strong>Objekt:</strong><br>
      ${esc(doc.projektName ? doc.projektName + ' — ' : '')}${esc(doc.lage)}${doc.qm ? ' mit ' + String(doc.qm).replace('.', ',') + ' qm' : ''}${doc.weNr ? ', Wohnungsnummer ' + esc(doc.weNr) : ''}</p>

      <table class="objekt">
        <tr><td>Kaufpreis Wohnung</td><td class="z">${eur(doc.kpWohnung)}</td></tr>
        ${doc.stellplatzKp > 0 ? `<tr><td>Kaufpreis Stellplatz / Garage</td><td class="z">${eur(doc.stellplatzKp)}</td></tr>` : ''}
        <tr class="summe"><td>Gesamtkaufpreis</td><td class="z">${eur(doc.kpGesamt)}</td></tr>
        ${subvZeilen}
        ${doc.subvGesamt > 0 ? `<tr><td>Mietsubvention gesamt</td><td class="z">${eur(doc.subvGesamt)}</td></tr>` : ''}
      </table>
      ${doc.renoBudget > 0 ? `<p class="block"><strong>Renovierungsbudget:</strong> Im Kaufpreis inkludiert ist ein Budget von ${eur(doc.renoBudget)}, das entweder für Renovierungsmaßnahmen genutzt oder auf den Kaufpreis angerechnet werden kann.</p>` : ''}

      <div class="praemisse">
        Diese Vereinbarung gilt unter der Prämisse, dass der Zustand von Haus und Wohnung bei der Besichtigung —
        diese findet am selben Tag wie der Notartermin statt — dem Exposé entspricht.
      </div>

      <div class="sig-grid">
        <div class="sig-col">
          <img class="sig-img" src="/assets/unterschrift-hw.png" alt="Unterschrift Verkäufer">
          <div class="sig-linie"></div>
          <div class="sig-meta">Schutterwald, den ${esc(d.erstelltAm ? new Date(d.erstelltAm).toLocaleDateString('de-DE') : heute)}<br>
          Verkäufer: Henry Wacker<br>B&amp;B Immo GmbH</div>
        </div>
        <div class="sig-col rechts">
          ${signiert
            ? `<img class="sig-img" src="${d.signiert.png}" alt="Unterschrift Kaufinteressent"><div class="sig-linie"></div>`
            : `<canvas id="sig-canvas" width="680" height="220" class="no-print-keep"></canvas>
               <div class="sig-tools no-print"><button type="button" class="btn-ghost" id="sig-clear">Feld leeren</button></div>
               <div class="sig-linie"></div>`}
          <div class="sig-meta">${esc(adr.ort)}, den ${signiert ? new Date(d.signiert.am).toLocaleDateString('de-DE') : heute}<br>
          Kaufinteressent-/in:<br><strong>${esc(d.kaeufer)}</strong></div>
        </div>
      </div>

      <div class="aktion no-print">
        ${signiert
          ? `<button type="button" class="btn-primary" onclick="window.print()">Drucken / als PDF sichern</button>`
          : `<button type="button" class="btn-primary" id="sig-submit" disabled>Jetzt verbindlich unterschreiben</button>
             <div class="hinweis">Bitte unterschreiben Sie mit Finger oder Maus im Feld oben rechts.<br>
             Mit dem Klick wird die Reservierungsvereinbarung verbindlich abgesendet.</div>`}
      </div>
    `;
    statusEl.style.display = 'none';
    docEl.style.display = 'block';
    if (!signiert) initPad();
  }

  function initPad() {
    const canvas = document.getElementById('sig-canvas');
    const submit = document.getElementById('sig-submit');
    const ctx = canvas.getContext('2d');
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1A1A17';
    let zeichnet = false, hatStriche = false;

    const pos = (ev) => {
      const r = canvas.getBoundingClientRect();
      const p = ev.touches ? ev.touches[0] : ev;
      return { x: (p.clientX - r.left) * (canvas.width / r.width), y: (p.clientY - r.top) * (canvas.height / r.height) };
    };
    const start = (ev) => { ev.preventDefault(); zeichnet = true; const p = pos(ev); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
    const move = (ev) => {
      if (!zeichnet) return;
      ev.preventDefault();
      const p = pos(ev);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      if (!hatStriche) { hatStriche = true; submit.disabled = false; }
    };
    const end = () => { zeichnet = false; };
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);

    document.getElementById('sig-clear').addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hatStriche = false;
      submit.disabled = true;
    });

    submit.addEventListener('click', async () => {
      if (!hatStriche) return;
      submit.disabled = true;
      submit.textContent = 'Wird gesendet …';
      try {
        const resp = await fetch(api, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ signaturPng: canvas.toDataURL('image/png') }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.error || ('HTTP ' + resp.status));
        laden(); // neu laden → signierter Zustand mit Erfolgs-Banner
      } catch (e) {
        submit.disabled = false;
        submit.textContent = 'Jetzt verbindlich unterschreiben';
        alert('Senden fehlgeschlagen: ' + e.message);
      }
    });
  }

  async function laden() {
    try {
      const resp = await fetch(api);
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.error || ('HTTP ' + resp.status));
      render(data);
    } catch (e) {
      statusEl.innerHTML = '<span class="fehler">' + esc(e.message || 'Link ungültig') + '</span>';
    }
  }

  if (!token) {
    statusEl.innerHTML = '<span class="fehler">Kein Zugangs-Token — bitte den vollständigen Link aus der Nachricht Ihres Beraters öffnen.</span>';
  } else {
    laden();
  }
})();
</script>
</body>
</html>
