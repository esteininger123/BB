<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selbstauskunft — B&amp;B Immo</title>
<!-- FS-1 Pen-Tester (2026-05-24): Token in URL darf nicht an externe Resources
     leaken (Google Fonts, etc). no-referrer schützt vor Token-Leak via Referer. -->
<meta name="referrer" content="no-referrer">
<!-- Token-Schutz auch via CSP: nur self + Fonts erlaubt. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBFAF7; --bg-card: #FFFFFF; --bg-soft: #F4F1EA;
  --text: #1A1A17; --text-secondary: #5A5A52; --text-tertiary: #7A7A72;
  --accent: #B08A4D; --accent-dark: #8E6E3D;
  --positive: #2D6E47; --negative: #9A3E33;
  --border: #E8E6DD; --border-strong: #D5D0BF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
  padding: 24px 16px 80px;
}
.wrap { max-width: 880px; margin: 0 auto; }

header.top {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 18px;
}
.brand {
  display: flex;
  flex-direction: column;
  margin-bottom: 10px;
  line-height: 1.05;
  gap: 4px;
}
.brand-mark {
  font-family: 'Helvetica Neue','Inter',Helvetica,Arial,sans-serif;
  font-weight: 200;
  font-size: 26px;
  color: #1a1a1a;
  letter-spacing: -0.6px;
  background: none;
  padding: 0;
}
.brand-text {
  font-family: 'Helvetica Neue','Inter',Helvetica,Arial,sans-serif;
  font-size: 11px;
  color: #888;
  font-style: italic;
  letter-spacing: 0.02em;
}
h1 {
  font-size: 24px;
  font-weight: 600;
  margin-top: 6px;
  margin-bottom: 6px;
}
.subtitle {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 12px;
}
.intro {
  background: rgba(176, 138, 77, .08);
  border-left: 3px solid var(--accent);
  padding: 12px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 12px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  margin: 14px 0;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  padding-bottom: 10px;
  margin-bottom: 14px;
  border-bottom: 2px solid var(--accent);
}
.card-subtitle {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 400;
  margin-left: 8px;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 600px) {
  .grid-2 { grid-template-columns: 1fr; }
}
.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
}
@media (max-width: 600px) {
  .grid-3 { grid-template-columns: 1fr; }
}

label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 3px;
  font-weight: 500;
}
input[type=text], input[type=number], input[type=email], input[type=date], select, textarea {
  width: 100%;
  padding: 11px 12px; /* FS-1 UX: 44px Touch-Target auf Mobile (vorher 36px) */
  font-size: 14px;
  border: 1px solid var(--border-strong);
  border-radius: 5px;
  font-family: inherit;
  background: var(--bg-card);
  color: var(--text);
  min-height: 44px; /* expliziter Touch-Min */
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(176,138,77,.18);
}
input[readonly] {
  background: var(--bg-soft);
  color: var(--text-secondary); /* FS-1 UX: WCAG-AA-Kontrast (vorher --text-tertiary 3.5:1) */
  cursor: not-allowed;
}
textarea {
  min-height: 60px;
  resize: vertical;
}

.section-sub {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-dark);
  margin: 18px 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px dotted var(--border);
}

.kollege-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg-soft);
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  margin: 14px 0;
}
.kollege-toggle input { width: auto; }

.list-item {
  background: var(--bg-soft);
  border-radius: 6px;
  padding: 12px 14px;
  margin: 8px 0;
  position: relative;
}
.list-item-remove {
  position: absolute;
  top: 8px;
  right: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-tertiary);
  padding: 2px 8px;
  font-size: 11px;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
}
.list-item-remove:hover {
  color: var(--negative);
  border-color: var(--negative);
}

button.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 11px 20px;
  font-size: 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
}
button.btn:hover { background: var(--accent-dark); }
button.btn:disabled { opacity: .5; cursor: not-allowed; }
button.btn-secondary {
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border-strong);
}
button.btn-secondary:hover {
  background: var(--bg-soft);
  border-color: var(--accent);
  color: var(--accent-dark);
}
button.btn-add {
  background: transparent;
  color: var(--accent-dark);
  border: 1px dashed var(--border-strong);
  padding: 7px 14px;
  font-size: 12px;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
}
button.btn-add:hover {
  background: rgba(176,138,77,.05);
  border-color: var(--accent);
}

.actions {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.save-status {
  font-size: 12px;
  color: var(--text-tertiary);
}
.save-status.saving { color: var(--accent); }
.save-status.saved { color: var(--positive); }
.save-status.error { color: var(--negative); }

.loading, .error-state, .success-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}
.error-state {
  color: var(--negative);
}
.success-state {
  color: var(--positive);
}
.success-state h2 {
  font-size: 22px;
  margin-bottom: 12px;
}
.unit-hint { font-size: 11px; color: var(--text-tertiary); margin-left: 4px; }

/* Kurzer Hilfetext unter einem Eingabefeld — erklärt erklärungsbedürftige Felder
   knapp, ohne aufzublähen. */
.field-help {
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.4;
  margin-top: 3px;
}

/* Sub-Label innerhalb einer Immobilien-Karte (Finanzierungs-Abschnitt) */
.immo-baufi-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-dark);
  margin: 14px 0 8px;
}

.zusatz-gruppe { margin: 8px 0 4px; }

/* Eigenkapital-Herkunft: Checkbox-Zeilen mit optionalem Zusatz-Input */
.ek-list { display: flex; flex-direction: column; gap: 10px; }
.ek-row {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) minmax(0, 1.2fr);
  gap: 10px;
  align-items: center;
}
@media (max-width: 600px) { .ek-row { grid-template-columns: 1fr; gap: 4px; } }
.ek-check {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  cursor: pointer;
  margin: 0;
}
.ek-check input { width: auto; min-height: 0; }
.ek-extra { font-size: 13px; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Lade Selbstauskunft …</div>
</div>

<script>
// ============================================================
// SA-Portal: vereinfachte Selbstauskunft für den Kunden
// Token in URL, holt + speichert via /api/sa-portal/[token]
// FS-1 (24.05.2026): Token aus URL nach Erstausführung entfernen
// (Pen-Tester: Referrer/History-Leak), in sessionStorage für Re-Loads.
// ============================================================

const params = new URLSearchParams(location.search);
const SS_KEY = 'bbk_sa_portal_token';
let TOKEN = params.get('token') || '';
if (TOKEN) {
  try {
    sessionStorage.setItem(SS_KEY, TOKEN);
    // URL bereinigen — Token bleibt nur im sessionStorage
    history.replaceState(null, '', location.pathname);
  } catch {}
} else {
  try { TOKEN = sessionStorage.getItem(SS_KEY) || ''; } catch {}
}

let state = {
  loaded: false,
  kunde: null,
  sa: null,
  saving: false,
  saved: false,
  expiresAt: null,
};

// FS-1 (24.05.2026, Maurice HIGH #11): localStorage-Backup. Wenn Netzwerk-Save
// fehlschlägt, zumindest lokal speichern, damit Kunde nichts verliert.
const LS_BACKUP_KEY = 'bbk_sa_portal_backup';
function _saveBackup() {
  try { localStorage.setItem(LS_BACKUP_KEY, JSON.stringify(state.sa || {})); } catch {}
}
function _loadBackup() {
  try {
    const raw = localStorage.getItem(LS_BACKUP_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function _clearBackup() {
  try { localStorage.removeItem(LS_BACKUP_KEY); } catch {}
}

// === Initial-Load ===
async function init() {
  if (!TOKEN) {
    renderError('Kein Token in der URL — bitte den vollständigen Link aus der E-Mail nutzen.');
    return;
  }
  try {
    const res = await fetch('/api/sa-portal/' + encodeURIComponent(TOKEN));
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Link ungültig oder abgelaufen.');
    }
    const data = await res.json();
    state.kunde = { vorname: data.vorname, nachname: data.nachname };
    state.expiresAt = data.expiresAt;
    state.sa = data.saJson || _newSa();
    // Defensives Defaults
    if (!state.sa.antragsteller) state.sa.antragsteller = _newAntragsteller();
    else _ensureFields(state.sa.antragsteller);
    if (state.sa.mitantragsteller) _ensureFields(state.sa.mitantragsteller);
    if (state.sa.gemeinsam === undefined) state.sa.gemeinsam = false;
    if (!state.sa.herkunftEk || typeof state.sa.herkunftEk !== 'object') state.sa.herkunftEk = {};
    // FS-1 (24.05.2026, Maurice #11): wenn lokales Backup existiert + ist neuer
    // (mehr Felder ausgefüllt) als der Server-Stand → User fragen.
    const backup = _loadBackup();
    if (backup && _isMoreFilledThan(backup, state.sa)) {
      const useBackup = confirm(
        'Auf diesem Gerät sind lokale Änderungen gefunden worden, die noch nicht beim Vertrieb angekommen sind.\n\n' +
        'Möchtest Du diese lokal gespeicherten Daten wiederherstellen?\n\n' +
        '(Klick "OK" für lokale Version, "Abbrechen" für die Vertriebs-Version)'
      );
      if (useBackup) state.sa = backup;
    }
    state.loaded = true;
    render();
  } catch (e) {
    renderError(e.message || 'Fehler beim Laden.');
  }
}

// Heuristik: ist `a` weiter ausgefüllt als `b`? Zählt non-null/non-zero-Felder.
function _isMoreFilledThan(a, b) {
  const count = (o) => {
    if (!o || typeof o !== 'object') return 0;
    let n = 0;
    for (const k in o) {
      const v = o[k];
      if (v == null || v === '' || v === 0 || v === false) continue;
      if (typeof v === 'object') n += count(v);
      else n += 1;
    }
    return n;
  };
  return count(a) > count(b) + 3; // Toleranz: erst ab 3 mehr Werten als "größer"
}

function _newSa() {
  return {
    antragsteller: _newAntragsteller(),
    mitantragsteller: null,
    gemeinsam: false,
    herkunftEk: {},
  };
}
// WICHTIG: Schlüssel EXAKT wie im internen App-Formular + PDF (public/pdf.js,
// public/app.js saPersonHtml). So landet jeder Wert 1:1 in der Selbstauskunft-PDF.
function _newAntragsteller() {
  return {
    // Person
    vorname: '', name: '', geburtsname: '',
    geburtsdatum: '', geburtsort: '', staatsangehoerigkeit: '',
    strasse: '', plz: '', ort: '',
    wohnhaftSeit: '', vorAnschrift: '',
    wohnsituation: '', vermieter: '',
    telefonPrivat: '', telefonGeschaeftlich: '', email: '',
    steuerId: '',
    familienstand: '', gueterstand: '',
    kinderAnzahl: 0, kinderAlter: '', unterhaltspflichtig: 0,
    bank: '', iban: '', bic: '',
    // Beruf
    beruf: '', firma: '', beschaeftigtSeit: '', befristung: '', probezeit: 'nein',
    // Einkommen
    bruttoMo: 0, nettoMo: 0, steuerklasse: '', anzahlGehaelter: 13,
    kindergeldMo: 0, unterhaltMo: 0,
    // Ausgaben (PKV/Leasing/Unterhalt-Zahlung laufen über den Baukasten 'zusatzAusgaben')
    mieteMo: 0, lebenshaltungMo: 0,
    // Vermögen (Depots/Sparbücher/Bauspar laufen über 'zusatzVermoegen')
    bankguthaben: 0,
    // Listen
    immobilien: [],
    zusatzEinnahmen: [], zusatzAusgaben: [], zusatzVermoegen: [], zusatzVerbindlichkeiten: [],
    // GwG-Identifikation (Ausweis)
    gwg: { ausweisArt: '', ausweisNr: '', ausweisBehoerde: '', ausweisAusgestellt: '', ausweisGueltig: '' },
    // PEP wird im Portal NICHT abgefragt (zu erklärungsbedürftig), aber still auf "nein"
    // gesetzt — Compliance/App braucht einen Wert (kommt praktisch nie vor).
    pep: 'nein',
  };
}
// Sorgt dafür, dass ein vom Server geladener (evtl. teilbefüllter) Antragsteller
// alle erwarteten Felder hat, ohne vorhandene Werte zu überschreiben.
function _ensureFields(p) {
  if (!p || typeof p !== 'object') return;
  const def = _newAntragsteller();
  for (const k in def) {
    if (p[k] === undefined) p[k] = def[k];
  }
  if (!p.gwg || typeof p.gwg !== 'object') p.gwg = def.gwg;
  else for (const k in def.gwg) { if (p.gwg[k] === undefined) p.gwg[k] = def.gwg[k]; }
  if (!p.pep) p.pep = 'nein';
}

// === Rendering ===
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <header class="top">
      <div class="brand"><span class="brand-mark">Brot &amp; Butter</span><span class="brand-text">Immobilien</span></div>
      <h1>Hoppla.</h1>
      <div class="error-state">${esc(msg)}</div>
    </header>`;
}
function renderSuccess() {
  document.getElementById('app').innerHTML = `
    <header class="top">
      <div class="brand"><span class="brand-mark">Brot &amp; Butter</span><span class="brand-text">Immobilien</span></div>
    </header>
    <div class="success-state">
      <h2>✓ Vielen Dank!</h2>
      <p>Deine Selbstauskunft ist bei uns angekommen.<br>Wir melden uns in Kürze zur weiteren Abstimmung bei Dir.</p>
      <p style="margin-top:20px;font-size:13px;color:var(--text-tertiary);">Du kannst dieses Fenster jetzt schließen.</p>
    </div>`;
}

function render() {
  if (!state.loaded) return;
  const a = state.sa.antragsteller || {};
  const m = state.sa.mitantragsteller || {};
  const hasM = !!state.sa.gemeinsam;
  // Gültig-bis-Datum für Token-Info
  const expDateStr = state.expiresAt
    ? new Date(state.expiresAt).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' })
    : null;

  const app = document.getElementById('app');
  app.innerHTML = `
    <header class="top">
      <div class="brand"><span class="brand-mark">Brot &amp; Butter</span><span class="brand-text">Immobilien</span></div>
      <h1>Selbstauskunft für ${esc((state.kunde.vorname || '') + ' ' + (state.kunde.nachname || '')).trim() || 'Dich'}</h1>
      <div class="subtitle">Diese Daten brauchen wir &amp; die finanzierende Bank — sie bleiben vertraulich.</div>
      <div class="intro">
        Bitte fülle die Felder so genau aus wie möglich. Was Du nicht parat hast, kannst Du leer lassen — wir ergänzen das gemeinsam beim nächsten Gespräch.
        <strong>Bei zwei Antragstellern</strong> (z.B. Du und Dein Partner) aktiviere den Schalter unten.
      </div>
      ${expDateStr ? `<div style="margin-top:10px;font-size:11px;color:var(--text-tertiary);">
        🔒 Dieser Link ist gültig bis <strong>${esc(expDateStr)}</strong>. Du kannst zwischendurch zwischenspeichern und später weitermachen.
      </div>` : ''}
    </header>

    ${renderAntragsteller('Antragsteller 1', a, false)}

    <label class="kollege-toggle">
      <input type="checkbox" ${hasM ? 'checked' : ''} onchange="window._toggleMit(this.checked)">
      <span>Zwei Antragsteller (Du &amp; eine zweite Person, z.B. Partner/in)</span>
    </label>

    ${hasM ? renderAntragsteller('Antragsteller 2', m, true) : ''}

    ${renderHerkunftEk(state.sa.herkunftEk || {})}

    <div class="actions">
      <span class="save-status ${state.saved ? 'saved' : ''}" id="save-status">${state.saved ? '✓ Gespeichert' : ''}</span>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-secondary" onclick="window._save(false)" ${state.saving ? 'disabled' : ''}>Zwischenspeichern</button>
        <button class="btn" onclick="window._save(true)" ${state.saving ? 'disabled' : ''}>Selbstauskunft absenden</button>
      </div>
    </div>
    <!-- FS-1 (24.05.2026, Maurice CRITICAL #2): Datenschutz-Hinweis -->
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-top:18px;font-size:12px;color:var(--text-secondary);line-height:1.6;">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">Was passiert mit Deinen Daten?</div>
      <ul style="margin:0 0 0 18px;padding:0;">
        <li><strong>Empfänger:</strong> Deine Daten landen direkt im Backoffice von B&amp;B Immo GmbH. Wir geben sie nur an die finanzierende Bank weiter — nach Deiner ausdrücklichen Freigabe.</li>
        <li><strong>Speicherdauer:</strong> Solange der Geschäftsvorgang läuft + gesetzliche Aufbewahrungsfristen (i.d.R. 10 Jahre). Auf Wunsch früher löschen.</li>
        <li><strong>Übertragung:</strong> Verschlüsselt via HTTPS. Token im Link wird nach Erstausführung aus der URL entfernt.</li>
        <li><strong>Deine Rechte:</strong> Auskunft, Berichtigung, Löschung, Datenübertragbarkeit nach DSGVO Art. 15-21. Kontakt: datenschutz@immo-stein.de</li>
      </ul>
    </div>
    <div style="text-align:center;margin-top:24px;font-size:11px;color:var(--text-tertiary);line-height:1.7;">
      B&amp;B Immo GmbH · Burdastraße 23 · 77746 Schutterwald · HRB 727 814 (Amtsgericht Freiburg)<br>
      Vermittlung im Rahmen einer Erlaubnis nach § 34c GewO
    </div>
  `;
}

// ---- Feld-Helper (px = 'a' | 'm') ----------------------------------------
function _help(txt) { return txt ? `<div class="field-help">${txt}</div>` : ''; }
function fText(px, key, label, val, help) {
  return `<div><label>${esc(label)}</label>
    <input type="text" value="${esc(val || '')}" oninput="window._upd('${px}','${key}',this.value)">${_help(help)}</div>`;
}
function fNum(px, key, label, val, step, help) {
  return `<div><label>${esc(label)}</label>
    <input type="number" min="0" step="${step || 'any'}" inputmode="decimal" value="${val || ''}" oninput="window._upd('${px}','${key}',parseFloat(this.value)||0)">${_help(help)}</div>`;
}
function fDate(px, key, label, val, help) {
  return `<div><label>${esc(label)}</label>
    <input type="date" value="${esc(val || '')}" oninput="window._upd('${px}','${key}',this.value)">${_help(help)}</div>`;
}
function fSelect(px, key, label, val, opts, help) {
  return `<div><label>${esc(label)}</label>
    <select oninput="window._upd('${px}','${key}',this.value)">
      ${opts.map(o => `<option value="${esc(o.v)}" ${(val || '') === o.v ? 'selected' : ''}>${esc(o.l)}</option>`).join('')}
    </select>${_help(help)}</div>`;
}
// Ausweis-Felder sind verschachtelt unter p.gwg.*
function gNum() {} // (kein num im Ausweis)
function gText(px, key, label, val, help) {
  return `<div><label>${esc(label)}</label>
    <input type="text" value="${esc(val || '')}" oninput="window._updGwg('${px}','${key}',this.value)">${_help(help)}</div>`;
}
function gDate(px, key, label, val, help) {
  return `<div><label>${esc(label)}</label>
    <input type="date" value="${esc(val || '')}" oninput="window._updGwg('${px}','${key}',this.value)">${_help(help)}</div>`;
}

      <div class="grid-3">
        ${fSelect(px, 'gwg.ausweisArt', 'Ausweisart', g.ausweisArt, [
          { v: '', l: '—' }, { v: 'Personalausweis', l: 'Personalausweis' }, { v: 'Reisepass', l: 'Reisepass' }, { v: 'Sonstiges', l: 'Sonstiges' }
        ])}

        ${gText(px, 'ausweisBehoerde', 'Ausstellende Behörde', g.ausweisBehoerde)}
        ${gDate(px, 'ausweisAusgestellt', 'Ausgestellt am', g.ausweisAusgestellt)}

}

function renderImmoList(p, isMit) {
  const px = isMit ? 'm' : 'a';
  const arr = Array.isArray(p.immobilien) ? p.immobilien : [];
  if (arr.length === 0) {
    return '<div style="color:var(--text-tertiary);font-size:12px;font-style:italic;margin-bottom:6px;">Noch keine Immobilien — falls Du keine besitzt, ist das ok.</div>';
  }
  // Update-Helper für Array-Felder (Text vs. Zahl)
  const aT = (i, f) => `oninput="window._updArr('${px}','immobilien',${i},'${f}',this.value)"`;
  const aN = (i, f) => `oninput="window._updArr('${px}','immobilien',${i},'${f}',parseFloat(this.value)||0)"`;
  return arr.map((immo, i) => `
    <div class="list-item">
      <button class="list-item-remove" onclick="window._rmImmo('${px}',${i})">Entfernen</button>
      <div class="grid-3">
        <div><label>Art</label><input type="text" value="${esc(immo.art || '')}" ${aT(i,'art')}>${_help('Wohnung, Haus, Garage, Grundstück, Gewerbe …')}</div>
        <div><label>Anschrift</label><input type="text" value="${esc(immo.anschrift || '')}" ${aT(i,'anschrift')}></div>
        <div><label>Wohnfläche m²</label><input type="number" min="0" step="1" value="${immo.wohnflaeche || ''}" ${aN(i,'wohnflaeche')}></div>
        <div><label>Baujahr</label><input type="number" step="1" inputmode="numeric" value="${immo.baujahr || ''}" ${aN(i,'baujahr')}></div>
        <div><label>Erwerbsjahr</label><input type="number" step="1" inputmode="numeric" value="${immo.erwerbsjahr || ''}" ${aN(i,'erwerbsjahr')}></div>
        <div><label>Verkehrswert €</label><input type="number" min="0" step="1000" value="${immo.verkehrswert || ''}" ${aN(i,'verkehrswert')}>${_help('heutiger Marktwert, nicht der Kaufpreis von damals')}</div>
        <div><label>Dein Anteil %</label><input type="number" min="0" max="100" step="1" value="${immo.anteil !== undefined && immo.anteil !== null ? immo.anteil : 100}" oninput="window._updArr('${px}','immobilien',${i},'anteil', this.value===''?100:(parseFloat(this.value)||0))">${_help('100 = Vollbesitz, 50 bei hälftigem Besitz')}</div>
        <div><label>Mieten €/Mo</label><input type="number" min="0" step="10" value="${immo.mietenMo || ''}" ${aN(i,'mietenMo')}>${_help('falls vermietet')}</div>
      </div>
      <div class="immo-baufi-label">Finanzierung dieser Immobilie <span style="font-weight:400;color:var(--text-tertiary);">— falls noch ein Darlehen läuft</span></div>
      <div class="grid-2">
        <div><label>Ursprüngliche Darlehenshöhe €</label><input type="number" min="0" step="1000" value="${immo.baufiUrspruenglich || ''}" ${aN(i,'baufiUrspruenglich')}>${_help('Betrag, der damals aufgenommen wurde')}</div>
        <div><label>Restschuld heute €</label><input type="number" min="0" step="1000" value="${immo.baufiRestsaldo || ''}" ${aN(i,'baufiRestsaldo')}>${_help('was heute noch offen ist')}</div>
        <div><label>Rate €/Mo</label><input type="number" min="0" step="10" value="${immo.baufiBelastungMo || ''}" ${aN(i,'baufiBelastungMo')}></div>
        <div><label>Laufzeit bis</label><input type="date" value="${esc(immo.baufiLaufzeitBis || '')}" ${aT(i,'baufiLaufzeitBis')}></div>
      </div>
      <div style="margin-top:8px;"><label>Notiz / Besonderheiten <span class="unit-hint">(Erbpacht, Eigentumsverhältnisse, Sanierungsstau …)</span></label><textarea rows="2" style="width:100%;" ${aT(i,'notiz')}>${esc(immo.notiz || '')}</textarea></div>
    </div>
  `).join('');
}

// Ein Baukasten-Block (Einnahmen/Ausgaben/Vermögen/Verbindlichkeiten).
// variant: 'mo' (ein €/Mo-Betrag) · 'wert' (ein €-Betrag) · 'mo-wert' (Rate + Restsaldo).
function renderZusatzGruppe(p, isMit, key, label, einheit, variant, hint) {
  const px = isMit ? 'm' : 'a';
  const arr = Array.isArray(p[key]) ? p[key] : [];
  const isDoppel = variant === 'mo-wert';
  const betragFeld = variant === 'wert' ? 'wert' : 'mo';
  const rows = arr.map((x, i) => `
    <div class="list-item">
      <button class="list-item-remove" onclick="window._rmZ('${px}','${key}',${i})">Entfernen</button>
      <div class="grid-${isDoppel ? '3' : '2'}">
        <div><label>Bezeichnung</label><input type="text" value="${esc(x.titel || '')}" oninput="window._updArr('${px}','${key}',${i},'titel',this.value)"></div>
        ${isDoppel
          ? `<div><label>Rate €/Mo</label><input type="number" min="0" step="10" inputmode="decimal" value="${x.mo || ''}" oninput="window._updArr('${px}','${key}',${i},'mo',parseFloat(this.value)||0)"></div>
             <div><label>Restsaldo €</label><input type="number" min="0" step="100" inputmode="decimal" value="${x.wert || ''}" oninput="window._updArr('${px}','${key}',${i},'wert',parseFloat(this.value)||0)"></div>`
          : `<div><label>Betrag ${esc(einheit)}</label><input type="number" min="0" step="10" inputmode="decimal" value="${x[betragFeld] || ''}" oninput="window._updArr('${px}','${key}',${i},'${betragFeld}',parseFloat(this.value)||0)"></div>`}
      </div>
    </div>`).join('');
  return `
    <div class="zusatz-gruppe">
      ${hint ? `<div class="field-help" style="margin:4px 0 8px;">${hint}</div>` : ''}
      ${rows}
      <button class="btn-add" onclick="window._addZ('${px}','${key}')">+ ${esc(label)} hinzufügen</button>
    </div>`;
}

// Eigenkapital-Herkunft (PDF-Seite 3, GwG-Vorabfrage) — gilt für den ganzen Antrag.
function renderHerkunftEk(h) {
  h = h || {};
  const row = (key, label, extraKey, extraPlaceholder) => `
    <div class="ek-row">
      <label class="ek-check">
        <input type="checkbox" ${h[key] ? 'checked' : ''} onchange="window._updEk('${key}', this.checked)">
        <span>${esc(label)}</span>
      </label>
      ${extraKey ? `<input type="text" class="ek-extra" placeholder="${esc(extraPlaceholder)}" value="${esc(h[extraKey] || '')}" oninput="window._updEk('${extraKey}', this.value)">` : ''}
    </div>`;
  return `
    <div class="card">
      <div class="card-title">Eigenkapital — woher kommt es?</div>
      <div class="intro" style="margin-bottom:14px;">
        Die finanzierende Bank muss nach dem Geldwäschegesetz wissen, woher Dein Eigenkapital stammt. Kreuze an, was zutrifft — mehreres möglich.
      </div>
      <div class="ek-list">
        ${row('ersparnisse', 'Eigene Ersparnisse')}
        ${row('schenkung', 'Schenkung / Erbschaft', 'schenkGeber', 'Schenker / Erblasser (Name)')}
        ${row('verkauf', 'Verkaufserlös (Immobilie, Wertpapiere)', 'verkaufObjekt', 'Was wurde verkauft + Jahr')}
        ${row('bauspar', 'Bausparvertrag (zuteilungsreif)', 'bauspKasse', 'Bausparkasse')}
        ${row('lv', 'Lebens-/Rentenversicherung', 'lvAnbieter', 'Versicherer')}
        ${row('sonstiges', 'Sonstige Quelle', 'sonstQuelle', 'z.B. Arbeitgeber-Darlehen, Eigenleistung')}
      </div>
      <div style="margin-top:12px;">
        <label>Anmerkung (optional)</label>
        <input type="text" placeholder="z.B. „Notarvertrag liegt vor"" value="${esc(h.erlaeuterung || '')}" oninput="window._updEk('erlaeuterung', this.value)">
      </div>
    </div>`;
}

// === Handler ===
function _person(px) {
  if (px === 'a') return state.sa.antragsteller;
  if (px === 'm') {
    if (!state.sa.mitantragsteller) state.sa.mitantragsteller = _newAntragsteller();
    return state.sa.mitantragsteller;
  }
  return null;
}

window._upd = function(px, key, val) {
  const p = _person(px); if (!p) return;
  // Dotted keys (z.B. 'gwg.ausweisArt') in verschachteltes Objekt schreiben.
  if (key.indexOf('.') !== -1) {
    const [parent, child] = key.split('.');
    if (!p[parent] || typeof p[parent] !== 'object') p[parent] = {};
    p[parent][child] = val;
  } else {
    p[key] = val;
  }
  _markUnsaved();
};
// Ausweis-Felder (verschachtelt unter p.gwg)
window._updGwg = function(px, key, val) {
  const p = _person(px); if (!p) return;
  if (!p.gwg || typeof p.gwg !== 'object') p.gwg = {};
  p.gwg[key] = val;
  _markUnsaved();
};
// Eigenkapital-Herkunft (sa-weit, nicht pro Person)
window._updEk = function(key, val) {
  if (!state.sa.herkunftEk || typeof state.sa.herkunftEk !== 'object') state.sa.herkunftEk = {};
  state.sa.herkunftEk[key] = val;
  _markUnsaved();
};
window._updArr = function(px, listKey, idx, field, val) {
  const p = _person(px); if (!p) return;
  if (!Array.isArray(p[listKey])) p[listKey] = [];
  if (!p[listKey][idx]) p[listKey][idx] = {};
  p[listKey][idx][field] = val;
  _markUnsaved();
};
window._addImmo = function(px) {
  const p = _person(px); if (!p) return;
  if (!Array.isArray(p.immobilien)) p.immobilien = [];
  p.immobilien.push({ art: '', anschrift: '', baujahr: null, erwerbsjahr: null, wohnflaeche: null, verkehrswert: 0, anteil: 100, mietenMo: 0, baufiUrspruenglich: 0, baufiLaufzeitBis: '', baufiBelastungMo: 0, baufiRestsaldo: 0, notiz: '' });
  render();
};
window._rmImmo = function(px, idx) {
  const p = _person(px); if (!p) return;
  p.immobilien.splice(idx, 1);
  render();
};
window._addZ = function(px, key) {
  const p = _person(px); if (!p) return;
  if (!Array.isArray(p[key])) p[key] = [];
  p[key].push({ titel: '', notiz: '', mo: null, wert: null });
  render();
};
window._rmZ = function(px, key, idx) {
  const p = _person(px); if (!p) return;
  p[key].splice(idx, 1);
  render();
};
window._toggleMit = function(on) {
  state.sa.gemeinsam = !!on;
  if (on && !state.sa.mitantragsteller) state.sa.mitantragsteller = _newAntragsteller();
  render();
};

let _saveTimer = null;
function _markUnsaved() {
  state.saved = false;
  const el = document.getElementById('save-status');
  if (el) { el.textContent = '… Änderungen nicht gespeichert'; el.className = 'save-status'; }
  // Auto-Save mit 2s Debounce
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => window._save(false), 2000);
}

window._save = async function(submit) {
  if (state.saving) return;
  state.saving = true;
  // FS-1 (Maurice #11): IMMER lokales Backup VOR dem Server-Save — schützt bei Netzwerk-Fail
  _saveBackup();
  const el = document.getElementById('save-status');
  if (el) { el.textContent = '… speichert'; el.className = 'save-status saving'; }
  try {
    const res = await fetch('/api/sa-portal/' + encodeURIComponent(TOKEN), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ saJson: state.sa })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Fehler beim Speichern');
    }
    state.saved = true;
    state.saving = false;
    _clearBackup(); // Server hat es → lokales Backup nicht mehr nötig
    if (submit) {
      renderSuccess();
      return;
    }
    if (el) { el.textContent = '✓ Gespeichert'; el.className = 'save-status saved'; }
  } catch (e) {
    state.saving = false;
    // FS-1 (Maurice #11): Klare Fehler-Botschaft — lokal sind die Daten gesichert
    if (el) {
      el.textContent = '⚠ Speichern fehlgeschlagen — lokal gesichert, bitte erneut versuchen';
      el.className = 'save-status error';
    }
  }
};

init();
</script>
