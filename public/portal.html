<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unterlagen-Portal · B&B Immo</title>
<style>
  :root{ --cream:#FBFAF7; --ink:#1f1d1a; --muted:#6b6660; --line:#e7e2da;
    --bronze:#B08A4D; --bronze-d:#977339; --green:#2D6E47; --green-d:#245a3a; --card:#fff; }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--cream);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 70px}
  header{display:flex;align-items:center;gap:12px;padding:8px 0 18px;border-bottom:1px solid var(--line);margin-bottom:20px}
  .logo{font-weight:800;letter-spacing:.5px;color:var(--bronze);font-size:20px}
  .logo small{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
  h1{font-size:21px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 18px}
  .motiv{background:#eef5f0;border:1px solid #cfe3d6;border-left:4px solid var(--green);border-radius:10px;
    padding:13px 15px;font-size:13.5px;color:#234c37;margin-bottom:20px}
  .motiv b{color:#163524}
  .progress{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-size:13px;color:var(--muted)}
  .bar{flex:1;height:8px;background:#ece6dc;border-radius:6px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--green);width:0;transition:width .3s}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
  .card h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  ul.list{list-style:none;margin:0;padding:0}
  ul.list li{padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px;display:flex;align-items:center;gap:9px}
  ul.list li:last-child{border-bottom:none}
  .file a{color:var(--green);text-decoration:none;font-weight:600;word-break:break-word}
  .file a:hover{text-decoration:underline}
  .empty{color:var(--muted);font-size:13px;font-style:italic;padding:5px 0}
  .doc{border:1px solid var(--line);border-radius:11px;padding:14px;margin-bottom:11px;background:#fff}
  .doc.done{border-color:#bcdcc8;background:#f5faf6}
  .doc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .doc-label{font-weight:700;font-size:14.5px}
  .doc-hint{color:var(--muted);font-size:12.5px;margin-top:3px}
  .badge{flex:0 0 auto;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .badge.open{background:#f3ede2;color:#8a6d3b}
  .badge.done{background:#d8efe0;color:#1f6b41}
  .badge.opt{background:#eee;color:#888}
  .doc-files{margin:9px 0 0}
  .doc-files .f{font-size:12.5px;color:var(--green);display:flex;align-items:center;gap:6px;padding:3px 0;word-break:break-word}
  .doc-actions{display:flex;gap:9px;margin-top:11px;flex-wrap:wrap}
  .up-btn{flex:1;min-width:130px;border:none;border-radius:9px;padding:11px 12px;font-size:13.5px;font-weight:700;cursor:pointer}
  .up-btn.cam{background:var(--green);color:#fff}
  .up-btn.cam:hover{background:var(--green-d)}
  .up-btn.file{background:#fff;color:var(--ink);border:1.5px solid var(--bronze)}
  .up-btn.file:hover{background:#faf4ea}
  #status{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1f1d1a;color:#fff;
    padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%}
  #status.show{opacity:1}
  #status.err{background:#9A3E33}
  .center{text-align:center;padding:50px 0;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header><div class="logo">B&amp;B<small>Immo</small></div></header>
  <div id="content"><div class="center">Lädt…</div></div>
</div>
<div id="status"></div>

<script>
const token = new URLSearchParams(location.search).get('t') || '';
const apiBase = '/api/finanzierung/portal/' + encodeURIComponent(token);
const MAX_MB = 3;
const $ = (s, r) => (r||document).querySelector(s);
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let DATA = null;

function flash(msg, isErr){
  const el = $('#status'); el.textContent = msg; el.className = (isErr?'err ':'')+'show';
  clearTimeout(flash._t); flash._t = setTimeout(()=>{ el.className = el.className.replace('show','').trim(); }, isErr?5000:2500);
}

async function load(){
  if(!token){ renderErr('Kein Zugangs-Token im Link.'); return; }
  try{
    const r = await fetch(apiBase, {headers:{'accept':'application/json'}});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||('HTTP '+r.status)); }
    DATA = await r.json(); render();
  }catch(e){ renderErr(e.message); }
}

function renderErr(msg){
  $('#content').innerHTML = `<div class="card"><h2>⚠️ Link nicht gültig</h2>
    <p class="empty">${esc(msg)}</p>
    <p style="font-size:13px;color:var(--muted)">Bitte fordere bei deinem Ansprechpartner einen neuen Link an.</p></div>`;
}

function render(){
  const d = DATA;
  const name = (d.kundeName||'').split(' — ')[0] || '';
  const check = d.checkliste || [];
  const uploads = d.uploads || [];
  const objekt = d.objektunterlagen || [];
  // Uploads nach Punkt gruppieren
  const byPunkt = {};
  uploads.forEach(u => { (byPunkt[u.punkt||'_'] = byPunkt[u.punkt||'_'] || []).push(u); });
  const pflicht = check.filter(c=>!c.optional);
  const doneCount = pflicht.filter(c => (byPunkt[c.key]||[]).length).length;
  const pct = pflicht.length ? Math.round(doneCount/pflicht.length*100) : 0;

  const docBlocks = check.map(c => {
    const files = byPunkt[c.key] || [];
    const isDone = files.length > 0;
    const badge = c.optional ? '<span class="badge opt">optional</span>'
      : (isDone ? '<span class="badge done">erledigt ✓</span>' : '<span class="badge open">offen</span>');
    const fileList = files.map(f => `<div class="f">📄 ${esc((f.name||'').replace(/^.*? — /,''))}</div>`).join('');
    return `
      <div class="doc ${isDone?'done':''}">
        <div class="doc-top">
          <div><div class="doc-label">${esc(c.label)}</div><div class="doc-hint">${esc(c.hint||'')}</div></div>
          ${badge}
        </div>
        ${fileList ? `<div class="doc-files">${fileList}</div>` : ''}
        <div class="doc-actions">
          <button class="up-btn cam" onclick="pick('${c.key}',true)">📷 Foto aufnehmen</button>
          <button class="up-btn file" onclick="pick('${c.key}',false)">📎 Datei wählen</button>
        </div>
      </div>`;
  }).join('');

  $('#content').innerHTML = `
    <h1>Willkommen${name ? ', '+esc(name) : ''}</h1>
    <p class="sub">Lade hier deine Unterlagen für die Finanzierung hoch — am einfachsten direkt mit dem Handy abfotografieren.</p>
    <div class="motiv"><b>Je früher und vollständiger</b> du uns die Unterlagen gibst, desto <b>bessere Konditionen</b> bekommst du: Wir können dann frühzeitig <b>mehrere Banken</b> anfragen und die besten Angebote für dich einholen.</div>

    <div class="progress"><span>${doneCount}/${pflicht.length} erledigt</span><span class="bar"><i style="width:${pct}%"></i></span></div>

    <div>${docBlocks}</div>

    <div class="card" style="margin-top:18px">
      <h2>📂 Objektunterlagen</h2>
      ${objekt.length
        ? `<ul class="list">${objekt.map(f=>`<li class="file">📄 <a href="${esc(f.webViewLink||'#')}" target="_blank" rel="noopener">${esc(f.name)}</a></li>`).join('')}</ul>`
        : `<div class="empty">Aktuell sind keine Objektunterlagen hinterlegt.</div>`}
    </div>`;
}

// versteckter File-Input, dynamisch pro Klick
function pick(key, camera){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.multiple = true;
  inp.accept = camera ? 'image/*' : 'image/*,application/pdf';
  if(camera) inp.setAttribute('capture','environment');
  inp.onchange = () => { if(inp.files.length) uploadFiles(key, [...inp.files]); };
  inp.click();
}

function fileToBase64(file){
  return new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>{ const s=String(r.result); res(s.slice(s.indexOf(',')+1)); };
    r.onerror=rej; r.readAsDataURL(file); });
}

async function uploadFiles(key, files){
  let ok=0;
  for(const file of files){
    if(file.size > MAX_MB*1024*1024){ flash(`"${file.name}" ist zu groß (max. ${MAX_MB} MB).`, true); continue; }
    flash('Lade hoch: ' + file.name + ' …');
    try{
      const dataBase64 = await fileToBase64(file);
      const r = await fetch(apiBase, {method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({name:file.name,mimeType:file.type,dataBase64,punkt:key})});
      if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||('HTTP '+r.status)); }
      ok++;
    }catch(e){ flash(`Fehler bei "${file.name}": ${e.message}`, true); }
  }
  if(ok) flash(`${ok} Datei(en) hochgeladen ✓`);
  await load();
}
window.pick = pick;
load();
</script>
</body>
</html>
